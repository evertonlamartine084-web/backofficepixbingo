name: Health Check

on:
  schedule:
    - cron: '*/30 * * * *' # a cada 30 minutos
  workflow_dispatch: # permite rodar manualmente

jobs:
  check:
    name: Ping endpoints
    runs-on: ubuntu-latest
    steps:
      - name: Widget endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://nehmmvtpagncmldivnxn.supabase.co/functions/v1/gamification-widget?action=data")
          echo "gamification-widget: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::gamification-widget retornou $STATUS"
            exit 1
          fi

      - name: Sync XP endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://backofficepixbingobr.vercel.app/api/sync-player-xp?cpf=health")
          echo "sync-player-xp: $STATUS"
          # aceita 400 (cpf inválido) como sinal de que o endpoint está vivo
          if [ "$STATUS" = "000" ] || [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ]; then
            echo "::error::sync-player-xp retornou $STATUS"
            exit 1
          fi

      - name: Frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "https://backofficepixbingobr.vercel.app")
          echo "frontend: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::frontend retornou $STATUS"
            exit 1
          fi
